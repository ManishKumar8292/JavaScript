<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DOM || Create Elements</title>
  </head>
  <body style="background-color: #212121; color: #fff">
    <div class="parent">
      <div class="day">Monday</div>
      <div class="day">Tuesday</div>
      <div class="day">Wednesday</div>
      <div class="day">Thursday</div>
      <div class="day">Friday</div>
    </div>

    <script>
      const parentElement = document.querySelector(".parent");
      console.log(parentElement);
      console.log(parentElement.children); //two.html:20 HTMLCollection(5) [div.day, div.day, div.day, div.day, div.day]
      console.log(parentElement.children[0].innerHTML); //Monday

      for (let i = 0; i < parentElement.children.length; i++) {
        console.log(parentElement.children[i].innerHTML); //Monday Tuesday Wednesday Thursday Friday
      }

      parentElement.children[1].style.fontSize = "20px";

      console.log(parentElement.lastElementChild); //<div class="day">Friday</div>
      console.log(parentElement.firstElementChild); //<div class="day">Monday</div>

      const dayOne = document.querySelector(".day");
      console.log(dayOne); //<div class="day">Monday</div>
      console.log(dayOne.parentElement);
      console.log(dayOne.nextElementSibling); //<div class="day" style="font-size: 20px;">Tuesday</div>

      console.log("Node :", parentElement.childNodes);
    </script>
  </body>
</html>
